server {
    listen 80;
    server_name pricelist.wondertech.com.co;  # CAMBIA ESTO por tu dominio o IP

    # Logs
    access_log /var/log/nginx/pricelist-access.log;
    error_log /var/log/nginx/pricelist-error.log;

    # Límite de tamaño para subida de archivos (si aplica)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 120;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Ubicación principal - Proxy a la aplicación Flask
    location / {
        proxy_pass http://127.0.0.1:5008;
        proxy_http_version 1.1;
        
        # Headers importantes para Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Archivos estáticos (si los hay)
    location /static {
        alias /var/www/pricelist/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PDFs generados (opcional - acceso directo para descarga)
    location /pdfs/ {
        alias /var/www/pricelist/PDFs/output/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Opcional: Proteger con autenticación
        # auth_basic "Restricted Access";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:5008/;
        access_log off;
    }
}

