#########################################################
# WEBHOOKS ODOO - WONDERTECH
# HTTPS + Reverse Proxy
#########################################################

# ======================================================
# SERVER HTTPS
# ======================================================
server {
    server_name webhooks-odoo.wondertech.com.co;

    # Logs
    access_log /var/log/nginx/webhooks-odoo-access.log;
    error_log  /var/log/nginx/webhooks-odoo-error.log;

    # Max payload (webhooks)
    client_max_body_size 10M;

    # --------------------------------------------------
    # Webhook Normalización (App existente - 8080)
    # --------------------------------------------------
    location /webhook {
        proxy_pass http://127.0.0.1:8080/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # --------------------------------------------------
    # Facebook Webhook (3004)
    # --------------------------------------------------
    location /facebook/webhook {
        proxy_pass http://127.0.0.1:3004/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /facebook/health {
        proxy_pass http://127.0.0.1:3004/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location /facebook/stats {
        proxy_pass http://127.0.0.1:3004/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --------------------------------------------------
    # WooCommerce → Odoo (PM2 - 3000)
    # --------------------------------------------------
    location /woocommerce/webhook {
        proxy_pass http://127.0.0.1:3006/webhook/woocommerce;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /woocommerce/health {
        proxy_pass http://127.0.0.1:3006/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
    # --------------------------------------------------
    # Leads (Pixel GTM) → Odoo (PM2 - 3006)
    # --------------------------------------------------
    location /webhook/lead {
        proxy_pass http://127.0.0.1:3006/webhook/lead;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evitar caché para que cuente cada visita
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --------------------------------------------------
    # Instagram → Odoo (5000)
    # --------------------------------------------------
    location /instagram/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }


    # --------------------------------------------------
    # UVT / IVA Webhook (Flask - 3007)
    # --------------------------------------------------
    location /uvt/webhook {
        proxy_pass http://127.0.0.1:3007/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /uvt/health {
        proxy_pass http://127.0.0.1:3007/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location /uvt/refresh-config {
        proxy_pass http://127.0.0.1:3007/refresh-config;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --------------------------------------------------
    # PriceList Webhook (Flask - 5008)
    # Generación de listas de precios desde Odoo
    # --------------------------------------------------
    location /pricelist/ {
        proxy_pass http://127.0.0.1:5008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para generación de PDFs (puede tardar 10-30s)
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Desabilitar buffering para streaming de archivos (descargas directas)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Headers para descargas
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Type;
    }

    location /pricelist/health {
        proxy_pass http://127.0.0.1:5008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # --------------------------------------------------
    # Health general / Root
    # --------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # --------------------------------------------------
    # SSL
    # --------------------------------------------------
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate     /etc/letsencrypt/live/webhooks-odoo.wondertech.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhooks-odoo.wondertech.com.co/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ======================================================
# SERVER HTTP → HTTPS
# ======================================================
server {
    listen 80;
    listen [::]:80;
    server_name webhooks-odoo.wondertech.com.co;

    return 301 https://$host$request_uri;
}
